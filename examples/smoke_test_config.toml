[model]
state_names = ["x", "v", "U"]
equations = [
  "v",
  "-d * v - r1 * U + 0.5 * x - 0.5 * x^3 + F0 * cos(w * t)",
  "r2 * v - r3 * U",
]
parameter_names = ["w", "F0", "d", "r1", "r2", "r3"]
parameter_values = [0.3, 0.1, 0.0105, 0.13, 0.24, 0.55]
state_defaults = [0.0, 0.0, 0.0]

[initial_condition_plane]
x_state = "x"
y_state = "v"
x_min = -1.0
x_max = 1.0
y_min = -0.5
y_max = 0.5
grid_mode = "manual"
nx = 12
ny = 8
n_target = 96

[integration]
device = "cpu"
precision = "Float32"
solver_mode = "fixed"
solver = "Tsit5"
period_mode = "periodic"
period_expression = "2*pi/w"
transient_periods = 2.0
evaluation_periods = 1.0
samples_per_period = 24
t_transient = 0.0
t_evaluation = 0.0
dt = 0.0
save_dt = 0.0
abstol = 1.0e-9
reltol = 1.0e-7

[classification]
observable_state = "x"
zero_cross_state = "v"
fingerprint_tol = 1.0e-2
fingerprint_k = 4
extrema_eps = 1.0e-4
max_extrema = 12

[output]
run_name = "smoke_test"
write_labels_csv = true
write_basin_image = true
